<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d63384">

  <title>SafeHer Ultra X</title>

  <meta name="description"
    content="AI-powered women safety platform with SOS, location sharing, emergency contacts and safety tools.">

  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
</head>

<body>

  <header class="app-header">

  <div class="logo-box">
    <img src="assets/icons/icon-192.png" alt="SafeHer Logo">
  </div>

  <h1>SafeHer Ultra X</h1>

  <h3>AI Powered Women Safety Platform</h3>

  <p>Stay Safe • Stay Connected</p>

  </header>

  <main class="dashboard">

    <button id="sosBtn">🆘 SOS</button>

    <button id="locationBtn">📍 My Location</button>

    <button id="contactsBtn">👨‍👩‍👧 Emergency Contacts</button>

    <button id="emergencyMsgBtn">🚨 Emergency Message</button>

    <button id="alarmBtn">🔔 Emergency Alarm</button>

    <button id="fakeCallBtn">📞 Fake Call</button>

    <button id="voiceSOSBtn">🎤 Voice SOS</button>

    <button id="medicalBtn">🩺 Medical ID</button>

    <button id="checkInBtn">⏰ Safety Check-In</button>

    <button id="tripBtn">🚕 Trip Monitor</button>

    <button id="settingsBtn">⚙️ Settings</button>

  </main>

  <!-- Register Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("./service-worker.js")
          .then(() => console.log("✅ Service Worker Registered"))
          .catch(err => console.error(err));
      });
    }
  </script>

  <!-- JavaScript Files -->
  <script src="js/app.js"></script>
  <script src="js/sos.js"></script>
  <script src="js/location.js"></script>
  <script src="js/contacts.js"></script>
  <script src="js/emergency.js"></script>
  <script src="js/alarm.js"></script>
  <script src="js/fake-call.js"></script>
  <script src="js/medical.js"></script>
  <script src="js/voice-sos.js"></script>
  <script src="js/checkin.js"></script>
  <script src="js/trip-monitor.js"></script>
  <script src="js/settings.js"></script>

</body>

</html>
