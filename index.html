<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d63384" />

  <title>SafeHer Ultra X</title>
  <meta
    name="description"
    content="AI-powered women safety platform with SOS, live location sharing, offline protection, and intelligent emergency assistance."
  />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
</head>

<body>
  <header>
    <h1>SafeHer Ultra X</h1>
    <p>Stay Safe. Stay Connected.</p>
  </header>

  <main>
    <button id="sosBtn">🆘 SOS</button>
    <button id="locationBtn">📍 Live Location</button>
    <button id="contactsBtn">👨‍👩‍👧 Emergency Contacts</button>
    <button id="alarmBtn">🔔 Alarm</button>
  </main>

  <!-- JavaScript -->
  <script src="js/app.js"></script>

  <script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("./service-worker.js")
      .then(() => console.log("Service Worker Registered"))
      .catch((error) => console.error(error));
  });
}
  </script>

  <script src="js/sos.js"></script>
  
</body>
</html>
